<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>krewtree — Login V2 (Dark Minimal)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a232d; color: #111218;
      min-height: 100vh; display: flex; flex-direction: column;
    }

    /* ── Top bar ── */
    .topbar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 24px 40px;
    }
    .create-link { display: flex; align-items: center; gap: 12px; }
    .create-text { font-size: 13px; color: rgba(255,255,255,0.4); }
    .create-btn {
      background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.88);
      border: 1px solid rgba(255,255,255,0.14); border-radius: 9999px;
      padding: 7px 18px; font-size: 13px; font-weight: 600;
      cursor: pointer; font-family: inherit;
    }
    .create-btn:hover { background: rgba(255,255,255,0.13); }

    /* ── Center form area ── */
    main {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }

    .form-card {
      background: #fff; border-radius: 20px; padding: 48px 44px 44px;
      width: 100%; max-width: 400px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.55), 0 2px 8px rgba(0,0,0,0.25);
    }
    .form-card h2 {
      font-size: 27px; font-weight: 800; color: #111218;
      margin-bottom: 4px; letter-spacing: -0.5px;
    }
    .form-card .sub { font-size: 13px; color: #6b6b80; margin-bottom: 28px; }

    .field { display: flex; flex-direction: column; gap: 16px; }
    .field-group { display: flex; flex-direction: column; }
    .field-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
    label { font-size: 13px; font-weight: 600; color: #111218; }
    .forgot { background: none; border: none; cursor: pointer; font-size: 13px; color: #6d7531; font-family: inherit; padding: 0; }
    input[type="email"], input[type="password"] {
      width: 100%; border: 1px solid #e0e0ea; border-radius: 10px;
      padding: 10px 14px; font-size: 15px; font-family: inherit; color: #111218;
      background: #fff; outline: none;
    }
    input:focus { border-color: #0a232d; box-shadow: 0 0 0 3px rgba(10,35,45,0.08); }
    .submit-btn {
      width: 100%; background: #0a232d; color: #fff; border: none;
      border-radius: 10px; padding: 12px; font-size: 15px; font-weight: 600;
      cursor: pointer; font-family: inherit; margin-top: 4px;
    }
    .submit-btn:hover { background: #113648; }

    .divider {
      display: flex; align-items: center; gap: 10px; margin: 22px 0;
    }
    .divider-line { flex: 1; height: 1px; background: #e0e0ea; }
    .divider-or { font-size: 11px; color: #9191a8; text-transform: uppercase; letter-spacing: 0.06em; }

    .signup-link { text-align: center; font-size: 13px; color: #6b6b80; }
    .signup-link a { color: #6d7531; font-weight: 700; }

    /* ── Footer ── */
    .footer-note {
      text-align: center; padding: 0 0 24px;
      font-size: 11px; color: rgba(255,255,255,0.18); letter-spacing: 0.02em;
    }
  </style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <!-- Logo: onDark — sand mark, sand krew, olive tree -->

  </svg>
  <div class="create-link">
    <span class="create-text">New to krewtree?</span>
    <button class="create-btn">Create account</button>
  </div>
</div>

<!-- Centered form -->
<main>
  <div class="form-card">
    <h2>Sign in</h2>
    <p class="sub">Welcome back to krewtree.</p>
    <div class="field">
      <div class="field-group">
        <label for="email" style="margin-bottom:6px;">Email address</label>
        <input type="email" id="email" placeholder="you@example.com" />
      </div>
      <div class="field-group">
        <div class="field-row">
          <label for="password">Password</label>
          <button class="forgot">Forgot?</button>
        </div>
        <input type="password" id="password" placeholder="••••••••" />
      </div>
      <button class="submit-btn">Sign in →</button>
    </div>
    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-or">or</span>
      <div class="divider-line"></div>
    </div>
    <p class="signup-link">Don't have an account? <a href="#">Sign up free →</a></p>
  </div>
</main>

<p class="footer-note">A Regulix Partner Platform · © 2026 krewtree</p>

</body>
</html>
