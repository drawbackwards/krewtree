<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>krewtree — Landing Default</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; color: #111218; }
    a { text-decoration: none; color: inherit; }
    button { font-family: inherit; cursor: pointer; }

    /* ── Navbar ── */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: #fff; border-bottom: 1px solid #e0e0ea;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 32px; height: 60px;
    }
    .nav-right { display: flex; align-items: center; gap: 10px; }
    .btn-login {
      background: none; border: none; padding: 8px 16px;
      font-size: 14px; font-weight: 500; color: #3d3e4a; border-radius: 9999px;
    }
    .btn-login:hover { background: #f0f0f6; }
    .btn-signup {
      background: #0a232d; border: none; color: #fff;
      padding: 8px 18px; font-size: 14px; font-weight: 600; border-radius: 9999px;
    }
    .btn-signup:hover { background: #113648; }

    /* ── Hero ── */
    .hero { background: #fff; border-bottom: 1px solid #e0e0ea; }
    .hero-head {
      text-align: center;
      padding: 80px 24px 52px;
    }
    .hero-head h1 {
      font-size: clamp(32px, 5vw, 58px); font-weight: 300;
      color: #111218; letter-spacing: -1.5px; line-height: 1.1; margin-bottom: 12px;
    }
    .hero-head h1 strong { font-weight: 700; }
    .hero-head p { font-size: 17px; color: #6b6b80; max-width: 460px; margin: 0 auto; }

    /* Track cards */
    .cards-grid {
      max-width: 1100px; margin: 0 auto;
      padding: 0 24px 64px;
      display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
    }
    .track-card {
      border-radius: 24px; padding: 48px 44px;
      text-align: left; border: none; display: flex; flex-direction: column; gap: 20px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .track-card:hover { transform: translateY(-4px); }
    .track-card.worker { background: #0a232d; border: 1px solid rgba(229,218,195,0.1); }
    .track-card.worker:hover { box-shadow: 0 20px 40px rgba(10,35,45,0.25); }
    .track-card.company { background: #6d7531; border: 1px solid rgba(255,255,255,0.15); }
    .track-card.company:hover { box-shadow: 0 20px 40px rgba(109,117,49,0.35); }

    .badge {
      display: inline-block; font-size: 12px; font-weight: 600;
      border-radius: 9999px; padding: 4px 12px;
    }
    .badge-worker { background: #103949; color: rgba(229,218,195,0.85); }
    .badge-company { background: rgba(255,255,255,0.18); color: #fff; }

    .track-card h2 {
      font-size: clamp(28px, 3vw, 48px); font-weight: 700; color: #fff;
      line-height: 1.0; margin-bottom: 14px; letter-spacing: -0.5px;
    }
    .track-card p.desc { font-size: 15px; color: rgba(255,255,255,0.65); line-height: 1.6; max-width: 340px; }
    .track-card ul { list-style: none; display: flex; flex-direction: column; gap: 10px; }
    .track-card li { display: flex; align-items: center; gap: 10px; font-size: 13px; color: rgba(255,255,255,0.65); }
    .track-card li .check { color: rgba(255,255,255,0.9); font-weight: 700; }
    .card-cta {
      align-self: flex-start; display: inline-flex; align-items: center; gap: 8px;
      background: #fff; padding: 12px 24px; border-radius: 16px;
      font-weight: 600; font-size: 15px; margin-top: auto;
    }
    .card-cta.worker { color: #0a232d; }
    .card-cta.company { color: #6d7531; }

    /* Stats */
    .stats-row {
      max-width: 1100px; margin: 0 auto;
      padding: 0 24px 72px;
    }
    .stats-inner {
      display: flex; justify-content: center;
      padding-top: 40px; border-top: 1px solid #e0e0ea; flex-wrap: wrap; gap: 0;
    }
    .stat {
      flex: 1 0 120px; text-align: center; padding: 0 32px; margin-bottom: 16px;
    }
    .stat + .stat { border-left: 1px solid #e0e0ea; }
    .stat-num { font-size: clamp(22px, 2.5vw, 34px); font-weight: 700; color: #111218; line-height: 1; }
    .stat-label { font-size: 13px; color: #6b6b80; margin-top: 4px; }

    /* ── Footer ── */
    footer {
      background: #060f13; padding: 32px 24px;
      display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px;
    }
    .footer-brand { display: flex; align-items: center; gap: 10px; }
    .footer-brand span { font-size: 21px; font-weight: 700; color: #e5dac3; }
    .footer-partner { color: rgba(229,218,195,0.3); font-size: 13px; }
    .footer-links { display: flex; gap: 20px; }
    .footer-links a { font-size: 13px; color: rgba(229,218,195,0.4); }
    .footer-links a:hover { color: #e5dac3; }
    .footer-copy { font-size: 13px; color: rgba(229,218,195,0.25); }
  </style>
</head>
<body>

<!-- Navbar -->
<nav>

    <path fill="#6d7531" d="M662.86,170.96v-58.64h-17.42v-18.58h17.81v-31.35h21.48v31.35h29.61v18.58h-29.61v51.68l7.55,7.55h22.06v18.58h-32.32l-19.16-19.16Z"/>

    <path fill="#6d7531" d="M915.03,170.96v-57.87l19.16-19.35h52.45l19.55,19.35v36h-69.29v15.48l7.35,7.35h33.1l6.97-7.16v-5.81h21.68v12.39l-18.77,18.77h-53.22l-18.97-19.16ZM984.32,133.03v-13.35l-7.55-7.74h-32.32l-7.55,7.74v13.35h47.42Z"/>
  </svg>
  <div class="nav-right">
    <button class="btn-login">Log in</button>
    <button class="btn-signup">Sign up</button>
  </div>
</nav>

<!-- Hero -->
<section class="hero">
  <div class="hero-head">
    <h1>What brings you to <strong>krewtree</strong>?</h1>
    <p>The job board built for real work — pick your path below.</p>
  </div>

  <div class="cards-grid">
    <!-- Worker -->
    <button class="track-card worker">
      <div>
        <span class="badge badge-worker">For Workers</span>
        <h2>I'm looking<br>for work</h2>
        <p class="desc">Find jobs across every industry, build a verified profile, and get hired faster with Regulix.</p>
      </div>
      <ul>
        <li><span class="check">✓</span> Browse 12,400+ live jobs</li>
        <li><span class="check">✓</span> Build a verified work profile</li>
        <li><span class="check">✓</span> Get Regulix Ready — hire same day</li>
      </ul>
      <span class="card-cta worker">Browse Jobs →</span>
    </button>

    <!-- Company -->
    <button class="track-card company">
      <div>
        <span class="badge badge-company">For Companies</span>
        <h2>I'm looking<br>to hire</h2>
        <p class="desc">Post jobs, find verified workers, and hire people who can start tomorrow — paperwork already done.</p>
      </div>
      <ul>
        <li><span class="check">✓</span> Post jobs across every industry</li>
        <li><span class="check">✓</span> Find Regulix Ready workers instantly</li>
        <li><span class="check">✓</span> Hire same-day — no onboarding delays</li>
      </ul>
      <span class="card-cta company">Post a Job →</span>
    </button>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stats-inner">
      <div class="stat"><div class="stat-num">12,400+</div><div class="stat-label">Active Jobs</div></div>
      <div class="stat"><div class="stat-num">54,000+</div><div class="stat-label">Workers</div></div>
      <div class="stat"><div class="stat-num">620+</div><div class="stat-label">Verified Companies</div></div>
      <div class="stat"><div class="stat-num">8</div><div class="stat-label">Industries</div></div>
    </div>
  </div>
</section>

<!-- Footer -->
<footer>
  <div class="footer-brand">
    <span>krewtree</span>
    <span class="footer-partner">· A Regulix Partner Platform</span>
  </div>
  <div class="footer-links">
    <a href="#">About</a><a href="#">Employers</a><a href="#">Workers</a>
    <a href="#">Privacy</a><a href="#">Terms</a>
  </div>
  <span class="footer-copy">© 2026 krewtree. All rights reserved.</span>
</footer>

</body>
</html>
